<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="base.css" />
<style>
  .slide { background: var(--vitality-green); justify-content: center; gap: 42px; padding: 0 84px; text-align: center; }
  .brand-row { position: relative; justify-content: center; }
  .brand-name { color: var(--white); }
  .brand-mark { background: var(--white); color: var(--vitality-green); box-shadow: 0 8px 0 var(--sunshine); }
  h1 { font-size: 84px; color: var(--white); line-height: 1.1; position: relative; }
  h1 .heart { color: var(--sunshine); }
  .sub { color: rgba(255, 255, 255, 0.95); font-size: 29px; font-weight: 500; position: relative; max-width: 780px; }
  .cta {
    display: inline-block; background: var(--sunshine); color: var(--ink);
    font-family: 'Baloo 2', sans-serif; font-weight: 800; font-size: 50px;
    padding: 32px 62px; border-radius: 999px; box-shadow: 0 14px 0 rgba(0, 0, 0, 0.28);
    transform: rotate(-1.5deg); position: relative;
  }
  .cta small { display: block; font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 22px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; }
  .tagchips { display: flex; gap: 16px; justify-content: center; position: relative; flex-wrap: wrap; }
  .tagchips .chip { font-size: 22px; padding: 12px 24px; }
  .c1 { background: rgba(255, 255, 255, 0.18); color: var(--white); }
</style>
</head>
<body>
<div class="slide">
  <span class="blob" style="width:330px;height:330px;right:-120px;top:-110px;background:var(--sunshine);opacity:.9"></span>
  <span class="blob" style="width:210px;height:210px;left:-85px;bottom:16%;background:var(--sky-blue);opacity:.85"></span>
  <span class="blob" style="width:130px;height:130px;left:14%;top:-55px;background:var(--purple);opacity:.8"></span>
  <span class="ring" style="width:100px;height:100px;border:11px solid rgba(255,255,255,.4);right:10%;bottom:10%"></span>
  <span class="spark" style="left:8%;top:38%;font-size:44px;color:var(--sunshine)">✦</span>
  <span class="spark" style="left:90%;top:42%;font-size:34px;color:#fff">✧</span>
  <span class="spark" style="left:14%;top:82%;font-size:30px;color:#fff;opacity:.8">✦</span>
  <span class="plus" style="left:84%;top:20%;font-size:44px;color:var(--sunshine)">+</span>
  <span class="confetti" style="left:10%;top:20%;width:22px;height:22px;background:var(--sunshine)"></span>
  <span class="confetti" style="left:18%;top:66%;width:18px;height:18px;background:var(--energy-orange)"></span>
  <span class="confetti" style="left:86%;top:64%;width:26px;height:26px;background:var(--sky-blue)"></span>
  <span class="confetti tri" style="left:56%;top:10%"></span>
  <span class="spark" style="left:5%;top:55%;font-size:38px;color:#fff;opacity:.85">✦</span>
  <span class="spark" style="right:5%;top:31%;font-size:34px;color:var(--sunshine)">✧</span>

  <div class="brand-row">
    <span class="brand-mark">IB</span>
    <span class="brand-name">IceBrk</span>
  </div>

  <h1 class="display">Every gathering deserves a <span class="heart">core memory.</span></h1>
  <p class="sub">Birthdays, reunions, office nights, random Tuesdays. IceBrk turns any room into a party, and now remembers it for the next one.</p>

  <span class="cta"><small>Play free today</small>icebrk.vercel.app</span>

  <div class="tagchips">
    <span class="chip c1">Free forever</span>
    <span class="chip c1">Zero setup</span>
    <span class="chip c1">Now saves your games</span>
  </div>
</div>
</body>
</html>
