<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="base.css" />
<style>
  .slide { background: var(--sunshine); justify-content: center; gap: 42px; padding: 0 80px; }
  .head { text-align: center; position: relative; }
  .why-eyebrow { background: var(--ib-blue); color: var(--white); margin-bottom: 26px; box-shadow: 0 7px 0 rgba(34, 34, 59, 0.25); }
  h1 { font-size: 96px; line-height: 1.04; color: var(--ink); }
  h1 .flip { display: inline-block; color: var(--white); background: var(--energy-orange); padding: 0 28px; border-radius: 24px; transform: rotate(-2deg); box-shadow: 0 9px 0 rgba(34, 34, 59, 0.25); }
  .cards { display: flex; flex-direction: column; gap: 28px; width: 100%; position: relative; }
  .card {
    display: flex; align-items: center; gap: 30px; background: var(--white); border-radius: 30px;
    padding: 34px 40px; box-shadow: 0 12px 0 rgba(34, 34, 59, 0.22);
  }
  .card:nth-child(1) { transform: rotate(-1deg); }
  .card:nth-child(2) { transform: rotate(0.8deg); }
  .card:nth-child(3) { transform: rotate(-0.8deg); }
  .icon {
    flex-shrink: 0; width: 92px; height: 92px; border-radius: 26px; display: grid; place-items: center;
    font-family: 'Baloo 2', sans-serif; font-weight: 800; font-size: 48px; color: var(--white);
    transform: rotate(-6deg); box-shadow: 0 7px 0 rgba(34, 34, 59, 0.18);
  }
  .card h3 { font-family: 'Baloo 2', sans-serif; font-weight: 800; font-size: 38px; margin-bottom: 4px; }
  .card p { font-size: 26px; color: var(--slate); font-weight: 500; }
  .link { position: relative; background: var(--ink); color: var(--sunshine); font-family: 'Baloo 2', sans-serif; font-weight: 800; font-size: 30px; padding: 16px 40px; border-radius: 999px; box-shadow: 0 8px 0 rgba(34, 34, 59, 0.3); transform: rotate(-1deg); }
</style>
</head>
<body>
<div class="slide">
  <span class="blob" style="width:240px;height:240px;right:-90px;top:-80px;background:var(--energy-orange);opacity:.95"></span>
  <span class="blob" style="width:180px;height:180px;left:-70px;bottom:-60px;background:var(--sky-blue);opacity:.9"></span>
  <span class="ring" style="width:90px;height:90px;border:10px solid var(--purple);left:6%;top:26%;opacity:.7"></span>
  <span class="spark" style="left:88%;top:22%;font-size:44px;color:var(--ib-blue)">✦</span>
  <span class="spark" style="left:5%;top:60%;font-size:34px;color:var(--energy-orange)">✦</span>
  <span class="spark" style="left:92%;top:66%;font-size:30px;color:var(--purple)">✧</span>
  <span class="plus" style="left:10%;top:8%;font-size:44px;color:var(--vitality-green)">+</span>
  <span class="confetti" style="left:80%;top:9%;width:20px;height:20px;background:var(--ib-blue)"></span>
  <span class="ring" style="width:64px;height:64px;border:8px solid var(--ib-blue);right:5%;bottom:13%;opacity:.6"></span>

  <div class="head">
    <span class="eyebrow why-eyebrow">Why hosts love it</span>
    <h1 class="display">Awkward silence? <span class="flip">Not tonight.</span></h1>
  </div>

  <div class="cards">
    <div class="card">
      <span class="icon" style="background:var(--energy-orange)">0</span>
      <div>
        <h3>Zero setup</h3>
        <p>Open it, type names, play. Ready before the pizza arrives.</p>
      </div>
    </div>
    <div class="card">
      <span class="icon" style="background:var(--sky-blue)">1</span>
      <div>
        <h3>One screen, whole room</h3>
        <p>Project it and everyone plays along. No downloads, no apps.</p>
      </div>
    </div>
    <div class="card">
      <span class="icon" style="background:var(--vitality-green)">∞</span>
      <div>
        <h3>Free forever</h3>
        <p>No sign ups. No ads. No pakulo.</p>
      </div>
    </div>
  </div>

  <span class="link">icebrk.vercel.app</span>
</div>
</body>
</html>
